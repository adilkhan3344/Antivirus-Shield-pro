name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build with Buildozer
        uses: ArtemShatriy/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_display_name: AntivirusShield
          
